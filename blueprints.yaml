name: Config Override
slug: config-override
version: 0.9.0
description: Override page frontmatter and theme config via URL query params at runtime. Keep disabled in production.
icon: code
author:
  name: Hibbitts Design
  email: paul@hibbittsdesign.org
  url: http://hibbittsdesign.org
license: MIT

dependencies:
  - { name: grav, version: '>=1.7.0' }

form:
  validation: loose
  fields:
    enabled:
      type: toggle
      label: Plugin Status
      highlight: 1
      default: 0
      options:
        1: PLUGIN_ADMIN.ENABLED
        0: PLUGIN_ADMIN.DISABLED
      validate:
        type: bool
    allowed_routes:
      type: list
      label: Allowed Page Routes
      help: Page routes that can be targeted by config_page and config_pages. Leave empty to allow all routes.
      fields:
        .item:
          type: text
          placeholder: /route
